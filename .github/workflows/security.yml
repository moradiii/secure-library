name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  sast:
    name: SAST - SonarCloud
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: secure-library

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('secure-library/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and test
        run: mvn clean verify

      - name: Run SonarCloud analysis
        run: |
          mvn sonar:sonar
            -Dsonar.projectKey=moradiii_secure-library \
            -Dsonar.organization=moradiii \
            -Dsonar.host.url=https://sonarcloud.io \

  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: sast

    defaults:
      run:
        working-directory: secure-library

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Start Spring Boot app
        run: |
          nohup ./mvnw spring-boot:run > app.log 2>&1 &
          echo "Waiting for application to start..."
          sleep 60

      - name: Check app is reachable
        run: |
          curl --fail http://127.0.0.1:9091/login || (cat app.log && exit 1)

      - name: Create ZAP report folder
        run: mkdir -p zap-reports

      - name: Run OWASP ZAP Baseline Scan
        run: |
          docker run --rm --network=host \
            -v ${{ github.workspace }}/secure-library/zap-reports:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://127.0.0.1:9091 -r zap-report.html

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: secure-library/zap-reports/zap-report.html

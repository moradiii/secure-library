name: DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  sast:
    name: SAST - SonarQube Cloud
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secure-library

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('secure-library/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and test
        run: mvn clean verify

      - name: Run SonarQube Cloud analysis
        run: mvn sonar:sonar
          -Dsonar.projectKey=moradiii_secure-library
          -Dsonar.organization=moradiii
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: sast
    defaults:
      run:
        working-directory: secure-library

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Start Spring Boot app
        run: |
          mvn spring-boot:run > app.log 2>&1 &
          echo "Waiting for application to start..."
          sleep 45

      - name: Check app is reachable
        run: curl --fail http://localhost:9091/login || (cat app.log && exit 1)

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:9091"

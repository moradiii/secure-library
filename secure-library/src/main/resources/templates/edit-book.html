<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Book</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        form {
            max-width: 500px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 6px 0;
            box-sizing: border-box;
        }
        button {
            padding: 10px 16px;
            cursor: pointer;
        }
        a {
            text-decoration: none;
            margin-left: 10px;
        }
        .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>Edit Book</h1>

    <div style="margin-bottom: 20px;">
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit">Logout</button>
        </form>
    </div>

    <form th:action="@{'/admin/books/update/' + ${book.id}}" th:object="${book}" method="post">
        <label>Title</label>
        <input type="text" th:field="*{title}">
        <div class="error" th:errors="*{title}"></div>

        <label>Author</label>
        <input type="text" th:field="*{author}">
        <div class="error" th:errors="*{author}"></div>

        <label>Category</label>
        <input type="text" th:field="*{category}">
        <div class="error" th:errors="*{category}"></div>

        <label>Available</label>
        <select th:field="*{available}">
            <option th:value="true">True</option>
            <option th:value="false">False</option>
        </select>

        <button type="submit">Update Book</button>
        <a th:href="@{/books}">Back</a>
    </form>

</body>
</html>

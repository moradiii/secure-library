<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Books</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #f4f4f4;
        }
        a.button, button.button {
            display: inline-block;
            padding: 8px 12px;
            background: #ddd;
            text-decoration: none;
            color: black;
            border-radius: 4px;
            margin-bottom: 15px;
            border: none;
            cursor: pointer;
        }
        .actions a, .actions form {
            display: inline-block;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h1>Library Books</h1>
    <div style="margin-bottom: 20px;">
    <form th:action="@{/logout}" method="post" style="display:inline;">
        <button style="padding:8px 12px; cursor:pointer;">Logout</button>
    </form>
</div>
    <p>Logged in as: <strong th:text="${username}"></strong></p>

    <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
        <a class="button" th:href="@{/admin/books/add}">Add Book</a>
        <a class="button" th:href="@{/admin/requests}">View Borrow Requests</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Available</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.id}"></td>
                <td th:text="${book.title}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.category}"></td>
                <td th:text="${book.available}"></td>
                <td class="actions">
                    <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                        <a th:href="@{'/admin/books/edit/' + ${book.id}}">Edit</a>
                        <a th:href="@{'/admin/books/delete/' + ${book.id}}"
                           onclick="return confirm('Are you sure you want to delete this book?');">Delete</a>
                    </div>

                    <div th:if="${#authorization.expression('hasRole(''USER'')')}">
                        <form th:action="@{'/borrow/' + ${book.id}}" method="post" th:if="${book.available}">
                            <button class="button" type="submit">Borrow</button>
                        </form>
                        <span th:if="${!book.available}">Not available</span>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
